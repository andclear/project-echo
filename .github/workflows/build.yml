name: Build and Release Echo Client

on:
  push:
    tags:
      - 'v*' # 🚀 当您在本地推送形如 v1.0.0 的版本 Tag 时，自动触发多平台全自动打包流程

permissions:
  contents: write # 授予自动创建并写入 GitHub Release 附件的权限

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
  ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # 🚀 采用 Matrix 原生编译矩阵！
        # 针对含有 C++ 原生模块 (better-sqlite3) 的 Electron 项目，在各自原生虚拟机上进行编译是 100% 防崩、防架构不匹配的唯一标准实践！
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Project Dependencies
        run: npm ci

      - name: Rebuild Native C++ Modules (better-sqlite3)
        # 为当前构建系统的操作系统与 CPU 架构无损重新编译 C++ 原生库，彻底排除运行时二进制异常
        run: npx electron-builder install-app-deps

      - name: Compile and Transpile Assets (Vite Build)
        run: npm run build

      - name: Build Electron Installers (macOS - Intel x64)
        if: matrix.os == 'macos-latest'
        # 显式针对 x64 架构编译原生依赖并打包 x64 客户端
        run: |
          npx electron-builder install-app-deps --arch x64
          npx electron-builder --mac --x64 --publish never

      - name: Build Electron Installers (macOS - Apple Silicon arm64)
        if: matrix.os == 'macos-latest'
        # 显式针对 arm64 架构编译原生依赖并打包 arm64 客户端
        run: |
          npx electron-builder install-app-deps --arch arm64
          npx electron-builder --mac --arm64 --publish never

      - name: Build Electron Installers (Windows - x64)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Build Electron Installers (Linux - AppImage)
        if: matrix.os == 'ubuntu-latest'
        # 强制打包出全 Linux 主流发行版免安装通用的 .AppImage 包
        run: npx electron-builder --linux AppImage --publish never

      - name: Consolidate and Rename Installer
        shell: bash
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          mkdir -p release-dist
          
          # 1. 物理重命名 Windows 安装包 (.exe)
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXE_FILE=$(find dist/ -type f -name "*.exe" | head -n 1)
            if [ -n "$EXE_FILE" ]; then
              cp "$EXE_FILE" "release-dist/echo-$VERSION-win.exe"
              echo "Successfully renamed Windows: $EXE_FILE -> echo-$VERSION-win.exe"
            fi
          fi
          
          # 2. 物理重命名 Mac 安装包 (.dmg)
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            MAC_X64_FILE=$(find dist/ -type f -name "*x64*.dmg" | head -n 1)
            if [ -n "$MAC_X64_FILE" ]; then
              cp "$MAC_X64_FILE" "release-dist/echo-$VERSION-intel.dmg"
              echo "Successfully renamed Mac Intel: $MAC_X64_FILE -> echo-$VERSION-intel.dmg"
            fi
            MAC_ARM_FILE=$(find dist/ -type f -name "*arm64*.dmg" | head -n 1)
            if [ -n "$MAC_ARM_FILE" ]; then
              cp "$MAC_ARM_FILE" "release-dist/echo-$VERSION-arm.dmg"
              echo "Successfully renamed Mac ARM: $MAC_ARM_FILE -> echo-$VERSION-arm.dmg"
            fi
          fi
          
          # 3. 物理重命名 Linux 安装包 (.AppImage)
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            LINUX_FILE=$(find dist/ -type f -name "*.AppImage" | head -n 1)
            if [ -n "$LINUX_FILE" ]; then
              cp "$LINUX_FILE" "release-dist/echo-$VERSION-linux.appimage"
              echo "Successfully renamed Linux: $LINUX_FILE -> echo-$VERSION-linux.appimage"
            fi
          fi
          
          echo "=== Flattened Installer ==="
          ls -lh release-dist/

      - name: Upload Directly to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
