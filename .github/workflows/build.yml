name: Build and Release Echo Client

on:
  push:
    tags:
      - 'v*' # 🚀 当您在本地推送形如 v1.0.0 的版本 Tag 时，自动触发多平台全自动打包流程

permissions:
  contents: write # 授予自动创建并写入 GitHub Release 附件的权限

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # 🚀 采用 Matrix 原生编译矩阵！
        # 针对含有 C++ 原生模块 (better-sqlite3) 的 Electron 项目，在各自原生虚拟机上进行编译是 100% 防崩、防架构不匹配的唯一标准实践！
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Project Dependencies
        run: npm ci

      - name: Rebuild Native C++ Modules (better-sqlite3)
        # 为当前构建系统的操作系统与 CPU 架构无损重新编译 C++ 原生库，彻底排除运行时二进制异常
        run: npx electron-builder install-app-deps

      - name: Compile and Transpile Assets (Vite Build)
        run: npm run build

      - name: Build Electron Installers (macOS - Intel & Apple Silicon)
        if: matrix.os == 'macos-latest'
        # macos-latest 会读取 electron-builder.yml 中配置 of x64 与 arm64 自动打出两套 dmg 包，--publish never 禁用自动上传
        run: npx electron-builder --mac --publish never

      - name: Build Electron Installers (Windows - x64)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Build Electron Installers (Linux - AppImage)
        if: matrix.os == 'ubuntu-latest'
        # 强制打包出全 Linux 主流发行版免安装通用的 .AppImage 包
        run: npx electron-builder --linux AppImage --publish never

      - name: Upload Temporary Build Artifacts
        # 🚀 将各平台编译产物以独立任务名上传，解耦编译阶段与统一推送阶段，零并发冲突
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: ignore

  publish:
    name: Publish Release Artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # 统一单点写入 Github Release 权限

    steps:
      - name: Download All Temporary Artifacts
        # 🚀 一键拉取上一阶段全平台上传的独立 Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Consolidate, Rename and Flatten Installers
        # 🚀 将分布式矩阵生成的不同后缀安装包，物理汇聚、按规格重新命名并平铺展开到单一分发路径
        run: |
          mkdir -p release-dist
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          echo "Current version extracted from tag: $VERSION"
          
          # 1. 物理重命名 Windows 安装包 (.exe)
          EXE_FILE=$(find all-artifacts/ -type f -name "*.exe" | head -n 1)
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" "release-dist/echo-$VERSION-win.exe"
            echo "Successfully renamed Windows: $EXE_FILE -> echo-$VERSION-win.exe"
          fi
          
          # 2. 物理重命名 Mac Intel 安装包 (包含 x64 / intel)
          MAC_X64_FILE=$(find all-artifacts/ -type f -name "*x64*.dmg" | head -n 1)
          if [ -n "$MAC_X64_FILE" ]; then
            cp "$MAC_X64_FILE" "release-dist/echo-$VERSION-intel.dmg"
            echo "Successfully renamed Mac Intel: $MAC_X64_FILE -> echo-$VERSION-intel.dmg"
          fi
          
          # 3. 物理重命名 Mac ARM 安装包 (包含 arm64 / arm)
          MAC_ARM_FILE=$(find all-artifacts/ -type f -name "*arm64*.dmg" | head -n 1)
          if [ -n "$MAC_ARM_FILE" ]; then
            cp "$MAC_ARM_FILE" "release-dist/echo-$VERSION-arm.dmg"
            echo "Successfully renamed Mac ARM: $MAC_ARM_FILE -> echo-$VERSION-arm.dmg"
          fi
          
          # 4. 物理重命名 Linux 安装包 (.AppImage)
          LINUX_FILE=$(find all-artifacts/ -type f -name "*.AppImage" | head -n 1)
          if [ -n "$LINUX_FILE" ]; then
            cp "$LINUX_FILE" "release-dist/echo-$VERSION-linux.appimage"
            echo "Successfully renamed Linux: $LINUX_FILE -> echo-$VERSION-linux.appimage"
          fi
          
          echo "=== Consolidate and Rename Successfully ==="
          ls -lh release-dist/

      - name: Create and Publish to GitHub Release
        # 🚀 唯一单点串行创建 GitHub Release 并上传全部安装包，100% 杜绝 API 写入并发冲突
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
