name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*' # 🚀 当您在本地推送形如 v1.0.0 的版本 Tag 时，自动触发 Docker 镜像打包流程

permissions:
  contents: read
  packages: write # 授予自动将打包出的 Docker 镜像写入 GitHub Container Registry (GHCR) 的权限

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Extract Repository and Tag Metadata
        id: meta
        run: |
          # GitHub Packages 要求镜像路径（所有者与仓库名）必须全部物理小写，在此进行 tr 转换
          IMAGE_PATH=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${{ env.REGISTRY }}/$IMAGE_PATH" >> $GITHUB_OUTPUT
          
          # 提取版本 Tag 字符串
          TAG_NAME=${{ github.ref_name }}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Set up QEMU (Multi-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (Advanced Build Engine)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 内置单点凭证免密登录，100% 安全

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag_name }}
          cache-from: type=gha # 启用 GitHub Actions 高级层级构建缓存，秒级缓存命中
          cache-to: type=gha,mode=max
