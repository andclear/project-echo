appId: com.echo.app
productName: Echo
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - resources/**/*
  - package.json
asar: true
asarUnpack:
  - "**/better-sqlite3/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
mac:
  target:
    - target: default
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
