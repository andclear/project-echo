appId: com.echo.app
productName: Echo
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - resources/**/*
  - package.json
asar: true
asarUnpack:
  - "**/better-sqlite3/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
mac:
  target:
    # 🚀 将 target 精准限定为 dmg，避免产生多余的 zip 包，缩短 30% 以上的 Mac 平台 CI 打包耗时
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
linux:
  # 🚀 补齐显式 Linux 配置，确保生成的 AppImage 在各类 Linux 桌面系统中拥有完美高精度的应用图标与正确分类
  target:
    - AppImage
  category: Utility
  icon: build/icon.icns # electron-builder 会在打包 Linux 时智能从 icns/png 中提取出对应分辨率的图标
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  unicode: true # 🚀 开启 Unicode 宽字符支持，彻底规避因 Windows 安装路径包含中文/特殊字符而引发的乱码与安装失败
